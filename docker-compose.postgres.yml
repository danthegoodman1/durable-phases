services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:18.3}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    environment:
      POSTGRES_USER: durable
      POSTGRES_PASSWORD: durable
      POSTGRES_DB: durable
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U durable -d durable"]
      interval: 1s
      timeout: 5s
      retries: 30
    volumes:
      - durable-postgres-data:/var/lib/postgresql

volumes:
  durable-postgres-data:
